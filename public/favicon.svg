<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Bowling ball background circle -->
  <circle cx="64" cy="64" r="56" class="ball"/>

  <!-- Finger holes -->
  <circle cx="52" cy="45" r="8" class="hole"/>
  <circle cx="76" cy="45" r="8" class="hole"/>
  <circle cx="64" cy="70" r="8" class="hole"/>

  <!-- Highlight/shine effect -->
  <ellipse cx="48" cy="38" rx="18" ry="22" class="shine" opacity="0.3"/>

  <style>
    .ball { fill: #e74c3c; }
    .hole { fill: #1a1410; }
    .shine { fill: #ffffff; }

    @media (prefers-color-scheme: dark) {
      .ball { fill: #c0392b; }
      .hole { fill: #0a0604; }
    }
  </style>
</svg>
