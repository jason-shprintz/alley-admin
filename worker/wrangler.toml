name = "alleyadmin-registration-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Provision a separate D1 database per Wrangler environment and replace the
# placeholder IDs below with the values returned by `wrangler d1 create`.

[env.dev]

[env.dev.vars]
ALLOWED_ORIGIN = "http://localhost:4321"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "alleyadmin-registrations-dev"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" # Replace with your dev D1 database ID

[env.production]

[env.production.vars]
ALLOWED_ORIGIN = "https://alleyadmin.app"

[[env.production.d1_databases]]
binding = "DB"
database_name = "alleyadmin-registrations"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" # Replace with your production D1 database ID
